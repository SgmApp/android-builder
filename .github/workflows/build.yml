name: Android Build

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      # =========================================
      # 1. CHECKOUT
      # =========================================

      - name: Checkout Source Code
        uses: actions/checkout@v4


      # =========================================
      # 2. JAVA 17
      # =========================================

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'


      # =========================================
      # 3. ANDROID SDK
      # =========================================

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3


      # =========================================
      # 4. INSTALL SDK
      # =========================================

      - name: Install Android SDK
        run: |

          yes | sdkmanager --licenses || true

          sdkmanager "platform-tools"

          sdkmanager "platforms;android-35"

          sdkmanager "build-tools;35.0.0"


      # =========================================
      # 5. SHOW PROJECT FILES
      # =========================================

      - name: Show Project Files
        run: |

          echo "=============================="

          echo "CURRENT DIRECTORY"

          echo "=============================="

          pwd

          echo ""

          find . -maxdepth 5 -type f \
            ! -path "./.git/*" \
            -print


      # =========================================
      # 6. GRADLE PERMISSION
      # =========================================

      - name: Grant Gradle Permission
        run: |

          chmod +x gradlew

          ls -l gradlew


      # =========================================
      # 7. CHECK GRADLE VERSION
      # =========================================

      - name: Check Gradle Version
        run: |

          ./gradlew --version


      # =========================================
      # 8. CLEAN
      # =========================================

      - name: Clean Project
        run: |

          ./gradlew clean \
            --stacktrace \
            --console=plain


      # =========================================
      # 9. BUILD APK
      # =========================================

      - name: Build Debug APK
        run: |

          set -o pipefail

          ./gradlew :app:assembleDebug \
            --stacktrace \
            --info \
            --console=plain \
            2>&1 | tee build.log


      # =========================================
      # 10. SHOW BUILD FILES
      # =========================================

      - name: Check Build Output
        if: always()
        run: |

          echo "=============================="

          echo "SEARCHING APK FILES"

          echo "=============================="

          find . \
            -type f \
            -name "*.apk" \
            -print


          echo ""

          echo "=============================="

          echo "APP BUILD DIRECTORY"

          echo "=============================="


          if [ -d "app/build" ]; then

            find app/build \
              -type f \
              -print

          else

            echo "app/build directory not found"

          fi


      # =========================================
      # 11. UPLOAD BUILD LOG
      # =========================================

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore


      # =========================================
      # 12. FIND AND COPY APK
      # =========================================

      - name: Prepare APK
        if: success()
        run: |

          echo "=============================="

          echo "SEARCHING FOR APK"

          echo "=============================="


          APK=$(find . \
            -type f \
            -name "*.apk" \
            ! -path "./.git/*" \
            | head -n 1)


          if [ -z "$APK" ]; then

            echo "ERROR: APK NOT FOUND"

            exit 1

          fi


          echo "APK FOUND:"

          echo "$APK"


          cp "$APK" app-debug.apk


          echo ""

          echo "FINAL APK:"

          ls -lh app-debug.apk


      # =========================================
      # 13. UPLOAD APK
      # =========================================

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app-debug.apk
          if-no-files-found: error


      # =========================================
      # 14. BUILD SUCCESS
      # =========================================

      - name: Build Success
        if: success()
        run: |

          echo "=============================="

          echo "BUILD SUCCESSFUL"

          echo "=============================="

          echo "APK CREATED SUCCESSFULLY"

          ls -lh app-debug.apk
