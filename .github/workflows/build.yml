name: Android Build

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      # =========================================
      # 1. CHECKOUT SOURCE CODE
      # =========================================

      - name: Checkout
        uses: actions/checkout@v4


      # =========================================
      # 2. SETUP JAVA 17
      # =========================================

      - name: Setup JDK 17
        uses: actions/setup-java@v4

        with:
          distribution: temurin
          java-version: '17'


      # =========================================
      # 3. SETUP ANDROID SDK
      # =========================================

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3


      # =========================================
      # 4. INSTALL REQUIRED ANDROID SDK
      # =========================================

      - name: Install Android SDK
        run: |

          yes | sdkmanager --licenses || true

          sdkmanager "platform-tools"

          sdkmanager "platforms;android-35"

          sdkmanager "build-tools;35.0.0"


      # =========================================
      # 5. CHECK PROJECT FILES
      # =========================================

      - name: Check Project
        run: |

          echo "=============================="

          echo "CURRENT DIRECTORY"

          echo "=============================="

          pwd

          echo ""

          echo "PROJECT FILES"

          find . -maxdepth 3 -type f -print


      # =========================================
      # 6. CHECK GRADLE WRAPPER
      # =========================================

      - name: Check Gradle Wrapper
        run: |

          echo "=============================="

          echo "GRADLE WRAPPER"

          echo "=============================="

          chmod +x gradlew

          ls -l gradlew

          echo ""

          echo "Wrapper JAR:"

          ls -l gradle/wrapper/gradle-wrapper.jar

          echo ""

          echo "Wrapper Properties:"

          cat gradle/wrapper/gradle-wrapper.properties


      # =========================================
      # 7. CHECK GRADLE VERSION
      # =========================================

      - name: Check Gradle Version
        run: |

          chmod +x gradlew

          ./gradlew --version


      # =========================================
      # 8. CLEAN PROJECT
      # =========================================

      - name: Clean Project
        run: |

          ./gradlew clean --stacktrace


      # =========================================
      # 9. BUILD DEBUG APK
      # =========================================

      - name: Build Debug APK
        run: |

          ./gradlew :app:assembleDebug --stacktrace --info


      # =========================================
      # 10. SEARCH APK
      # =========================================

      - name: Search APK
        run: |

          echo "=============================="

          echo "SEARCHING FOR APK"

          echo "=============================="

          find . -type f -name "*.apk" -print

          echo ""

          APK=$(find . -type f -name "*.apk" | head -n 1)

          if [ -z "$APK" ]; then

            echo "ERROR: APK NOT FOUND"

            echo ""

            echo "APP BUILD DIRECTORY:"

            if [ -d "app/build" ]; then

              find app/build -type f -print

            else

              echo "app/build directory not found"

            fi

            exit 1

          fi

          echo "APK FOUND:"

          echo "$APK"

          cp "$APK" app-debug.apk


      # =========================================
      # 11. UPLOAD APK ARTIFACT
      # =========================================

      - name: Upload APK
        uses: actions/upload-artifact@v4

        with:

          name: app-debug

          path: app-debug.apk

          if-no-files-found: error

          compression-level: 6


      # =========================================
      # 12. BUILD SUMMARY
      # =========================================

      - name: Build Summary
        run: |

          echo "=============================="

          echo "BUILD SUCCESSFUL"

          echo "=============================="

          echo ""

          echo "APK FILE:"

          ls -lh app-debug.apk
