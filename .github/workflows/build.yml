name: Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout
      - name: Checkout source code
        uses: actions/checkout@v4


      # 2. Java 17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'


      # 3. Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3


      # 4. Install Android SDK
      - name: Install Android SDK
        run: |
          yes | sdkmanager --licenses || true

          sdkmanager "platform-tools"

          sdkmanager "platforms;android-35"

          sdkmanager "build-tools;35.0.0"


      # 5. Check project files
      - name: Check Project
        run: |
          echo "Current directory:"
          pwd

          echo "Project files:"
          find . -maxdepth 3 -type f | sort


      # 6. Make Gradle executable
      - name: Grant Gradle permission
        run: |
          chmod +x gradlew


      # 7. Clean
      - name: Clean Project
        run: |
          ./gradlew clean --stacktrace


      # 8. Build APK
      - name: Build Debug APK
        run: |
          ./gradlew :app:assembleDebug --stacktrace --info


      # 9. Verify APK
      - name: Verify APK
        run: |
          echo "=============================="
          echo "SEARCHING FOR APK"
          echo "=============================="

          if [ ! -d "app/build" ]; then
            echo "ERROR: app/build directory not found"
            echo "Gradle build did not create output"
            exit 1
          fi

          APK=$(find app/build/outputs/apk/debug -type f -name "*.apk" | head -n 1)

          if [ -z "$APK" ]; then
            echo "ERROR: APK file not found"
            find app/build -type f -print
            exit 1
          fi

          echo "APK FOUND:"
          echo "$APK"


      # 10. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
